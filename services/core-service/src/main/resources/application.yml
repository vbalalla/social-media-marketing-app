server:
  port: 8082

spring:
  application:
    name: core-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/serendia_core}
    username: ${SPRING_DATASOURCE_USERNAME:serendia}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          min-idle: 2

# JWT public key (RS256) — only for verification, never the private key
jwt:
  public-key: ${JWT_PUBLIC_KEY}
  issuer: ${JWT_ISSUER:https://api.serendia.io}

# Meta OAuth credentials
meta:
  app-id: ${META_APP_ID}
  app-secret: ${META_APP_SECRET}
  redirect-uri: ${META_REDIRECT_URI:http://localhost:8080/api/core/oauth/callback}

# TikTok OAuth credentials
tiktok:
  client-key: ${TIKTOK_CLIENT_KEY}
  client-secret: ${TIKTOK_CLIENT_SECRET}
  redirect-uri: ${TIKTOK_REDIRECT_URI:http://localhost:8080/api/core/oauth/callback}

# Token encryption
token:
  encryption:
    master-key: ${TOKEN_ENCRYPTION_MASTER_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    io.serendia: INFO
    org.springframework.security: WARN
