server:
  port: 8084

spring:
  application:
    name: ad-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/serendia_ad}
    username: ${SPRING_DATASOURCE_USERNAME:serendia}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms

jwt:
  public-key: ${JWT_PUBLIC_KEY}
  issuer: ${JWT_ISSUER:https://api.serendia.io}

meta:
  app-id: ${META_APP_ID}
  app-secret: ${META_APP_SECRET}

tiktok:
  client-key: ${TIKTOK_CLIENT_KEY}
  client-secret: ${TIKTOK_CLIENT_SECRET}

token:
  encryption:
    master-key: ${TOKEN_ENCRYPTION_MASTER_KEY}

# Reallocation engine config
reallocation:
  enabled: true
  cpa-delta-threshold-percent: 20
  max-shift-percent: 30
  evaluation-interval: PT1H

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    io.serendia: INFO
