# =============================================================================
# Nginx — Local API Gateway Configuration
# Routes all /api/* traffic to the correct microservice
# Handles CORS for the React SPA on localhost:3000
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # --- Upstream service definitions ---
    upstream auth_service {
        server auth-service:8081;
    }

    upstream core_service {
        server core-service:8082;
    }

    upstream ai_service {
        server ai-service:8083;
    }

    upstream ad_service {
        server ad-service:8084;
    }

    upstream inbox_service {
        server inbox-service:8085;
    }

    # --- Rate limiting zones ---
    limit_req_zone $http_x_user_id zone=per_user:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=30r/m;

    # --- CORS helper map ---
    map $http_origin $cors_origin {
        default "";
        "http://localhost:3000" "http://localhost:3000";
        "http://localhost:5173" "http://localhost:5173";
    }

    server {
        listen 8080;
        server_name localhost;

        # Global CORS preflight handler
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true'       always;
        }

        # --- Auth Service ---
        location /api/auth/ {
            limit_req zone=per_ip burst=20 nodelay;
            proxy_pass         http://auth_service/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Core Service ---
        location /api/core/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass         http://core_service/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- AI Service ---
        location /api/ai/ {
            limit_req zone=per_user burst=10 nodelay;
            proxy_pass            http://ai_service/ai/;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_read_timeout    120s;   # LLM calls can be slow
            proxy_send_timeout    120s;
        }

        # --- Ad Service ---
        location /api/ad/ {
            limit_req zone=per_user burst=30 nodelay;
            proxy_pass         http://ad_service/ad/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }


        # --- Prefixless Workspaces Inbox mapping (direct to inbox-service) ---
        location ~ ^/api/workspaces/([^/]+)/inbox {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass         http://inbox_service/workspaces/$1/inbox$is_args$args;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # --- Prefixless Workspaces mapping (direct to core-service) ---
        location /api/workspaces {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass         http://core_service/workspaces;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # --- Inbox Service (REST + WebSocket) ---
        location /api/inbox/ {
            limit_req zone=per_user burst=50 nodelay;
            proxy_pass         http://inbox_service/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /ws/inbox {
            proxy_pass          http://inbox_service/ws/inbox;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade    $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host       $host;
            proxy_read_timeout  3600s;
        }

        # --- Meta Webhooks (bypasses rate limit) ---
        location /webhooks/meta {
            proxy_pass         http://core_service/webhooks/meta;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # --- Health check aggregator ---
        location /health {
            access_log off;
            return 200 '{"status":"gateway_ok"}';
            add_header Content-Type application/json;
        }
    }
}
