# =============================================================================
# Serendia Platform — Helm Values
# Override per environment: helm upgrade ... -f values.staging.yaml
# =============================================================================

global:
  imageRegistry: ghcr.io/serendia-solutions
  imageTag: latest
  imagePullPolicy: IfNotPresent

# --- Auth Service ---
authService:
  enabled: true
  replicaCount: 2
  image:
    repository: serendia-auth-service
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# --- Core Service ---
coreService:
  enabled: true
  replicaCount: 2
  image:
    repository: serendia-core-service
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 1.5Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# --- AI Service (scales independently — expensive per pod) ---
aiService:
  enabled: true
  replicaCount: 1
  image:
    repository: serendia-ai-service
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 3Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 8
    targetCPUUtilizationPercentage: 60

# --- Ad Service ---
adService:
  enabled: true
  replicaCount: 2
  image:
    repository: serendia-ad-service
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: false

# --- Inbox Service (scales for message volume) ---
inboxService:
  enabled: true
  replicaCount: 2
  image:
    repository: serendia-inbox-service
  resources:
    requests:
      cpu: 500m
      memory: 768Mi
    limits:
      cpu: 1000m
      memory: 1.5Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    targetCPUUtilizationPercentage: 65

# --- Web SPA ---
web:
  enabled: true
  replicaCount: 2
  image:
    repository: serendia-web
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    - host: app.serendia.io
      paths:
        - path: /
          pathType: Prefix
          service: web
    - host: api.serendia.io
      paths:
        - path: /
          pathType: Prefix
          service: gateway
  tls:
    - secretName: serendia-tls
      hosts:
        - app.serendia.io
        - api.serendia.io

# --- Gateway (Nginx) ---
gateway:
  replicaCount: 2
  image:
    repository: nginx
    tag: "1.27-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
