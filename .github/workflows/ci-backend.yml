name: CI — Backend Services

on:
  push:
    branches: [main, develop]
    paths:
      - "services/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/**"

jobs:
  build-and-test:
    name: Build & Test — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - core-service
          - ai-service
          - ad-service
          - inbox-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run Maven verify (unit + integration tests)
        run: mvn --batch-mode verify
        working-directory: services/${{ matrix.service }}
        env:
          # Testcontainers pulls images at test time — no env vars needed
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/site/jacoco/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/surefire-reports/

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run SpotBugs on auth-service
        run: mvn --batch-mode compile spotbugs:check
        working-directory: services/auth-service
        continue-on-error: true

      - name: Run SpotBugs on core-service
        run: mvn --batch-mode compile spotbugs:check
        working-directory: services/core-service
        continue-on-error: true
