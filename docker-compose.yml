version: "3.9"

# =============================================================================
# Serendia Social Dashboard — Docker Compose (Local Development)
# =============================================================================
# Usage:
#   cp .env.example .env          # fill in your values
#   docker compose up --build     # first run (builds all images)
#   docker compose up             # subsequent runs
#   docker compose down -v        # stop + remove volumes
# =============================================================================

networks:
  serendia-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: serendia-postgres
    restart: unless-stopped
    networks: [serendia-net]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serendia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serendia}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: serendia-redis
    restart: unless-stopped
    networks: [serendia-net]
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: nginx:1.27-alpine
    container_name: serendia-gateway
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      auth-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      ad-service:
        condition: service_healthy
      inbox-service:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Backend Microservices
  # ---------------------------------------------------------------------------

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: serendia-auth
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serendia_auth
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-serendia}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_ACCESS_TOKEN_EXPIRY_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  core-service:
    build:
      context: ./services/core-service
      dockerfile: Dockerfile
    container_name: serendia-core
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${CORE_SERVICE_PORT:-8082}:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serendia_core
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-serendia}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      META_APP_SECRET: ${META_APP_SECRET}
      TOKEN_ENCRYPTION_MASTER_KEY: ${TOKEN_ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: serendia-ai
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${AI_SERVICE_PORT:-8083}:8083"
    environment:
      SERVER_PORT: 8083
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  ad-service:
    build:
      context: ./services/ad-service
      dockerfile: Dockerfile
    container_name: serendia-ads
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${AD_SERVICE_PORT:-8084}:8084"
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serendia_ad
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-serendia}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      TOKEN_ENCRYPTION_MASTER_KEY: ${TOKEN_ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  inbox-service:
    build:
      context: ./services/inbox-service
      dockerfile: Dockerfile
    container_name: serendia-inbox
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${INBOX_SERVICE_PORT:-8085}:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serendia_inbox
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-serendia}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      TOKEN_ENCRYPTION_MASTER_KEY: ${TOKEN_ENCRYPTION_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: serendia-web
    restart: unless-stopped
    networks: [serendia-net]
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - gateway
